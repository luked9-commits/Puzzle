<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unlock the Next Clue</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #login {
      text-align: center;
    }

    input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    #error {
      color: #ff6b6b;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Enter Password</h2>
  <p>Think carefully… you already know the answer.</p>

  <input type="password" id="password" placeholder="Password">
  <br>
  <button onclick="checkPassword()">Unlock</button>

  <p id="error"></p>
</div>

<script>
async function checkPassword() {
  const input = document.getElementById("password").value;

  const encoder = new TextEncoder();
  const data = encoder.encode(input);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

  const correctHash = "ecd71870d1963316a97e3ac3408c9835ad8cf0f3c1bc703527c30265534f75ae";

  if (hashHex === correctHash) {

    document.body.innerHTML = "<p style='color:white'>Decrypting satellite feed...</p>";

    setTimeout(async () => {
      const response = await fetch("https://i.ibb.co/LBwPzxd/daypuzzle.png");
      const blob = await response.blob();
      const url = URL.createObjectURL(blob);

      const img = document.createElement("img");
      img.src = url;
      img.style.maxWidth = "100%";
      img.style.maxHeight = "100%";

      document.body.innerHTML = "";
      document.body.appendChild(img);
    }, 1200);

  } else {
    document.getElementById("error").innerText = "Incorrect password.";
  }
}
</script>

</body>
</html>
